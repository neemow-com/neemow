<!DOCTYPE html>
<html>
<head>
  <title>Redirecting...</title>
</head>
<body>
<script>
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
  const hash = window.location.hash;
  const search = window.location.search;

  if (search.includes('type=resetpassword') || hash.includes('type=recovery')) {
    // Reset Password redirect
      window.location.href = "https://neemow-5d4cfz.flutterflow.app/resetpassword" + hash;
  } else {
    // Sign In redirect
    if (isMobile) {
      window.location.href = "https://neemow.com/?to=neemow://neemow.com/signin" + hash;
    } else {
      window.location.href = "https://neemow-5d4cfz.flutterflow.app/signin" + hash;
    }
  }
</script>
</body>
</html>
